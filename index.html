<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>進化した！難読さかな漢字クイズ</title>
  <style>
    body {
      font-family: 'MS Gothic', 'Yu Gothic', Arial, sans-serif;
      background-color: #f0f8ff;
      color: #333;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 650px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h1 { color: #006699; font-size: 28px; font-weight: bold; margin-bottom: 25px; }
    label { font-size: 20px; font-weight: bold; display: block; margin-bottom: 10px; }
    select {
      font-size: 18px;
      padding: 10px;
      width: 90%;
      max-width: 500px;
      margin-bottom: 20px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    .kanji { font-size: 72px; font-weight: bold; margin: 15px 0; color: #111; }
    .image-container {
      font-size: 14px;
      font-style: italic;
      color: gray;
      margin: 10px 0;
      min-height: 20px;
    }
    .image-container img {
      max-width: 200px;
      max-height: 150px;
      border-radius: 6px;
    }
    .btn {
      display: block;
      width: 100%;
      max-width: 500px;
      margin: 10px auto;
      padding: 12px;
      font-size: 18px;
      font-weight: bold;
      background-color: #008ccb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background-color: #006699; }
    .btn-next { background-color: #28a745; }
    .btn-next:hover { background-color: #218838; }
    input[type="text"] {
      width: 80%;
      max-width: 300px;
      padding: 10px;
      font-size: 18px;
      text-align: center;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .screen { display: none; }
    .active { display: block; }
    
    /* ランキング表示用スタイル */
    .rank-box { background: #f9f9f9; padding: 15px; border-radius: 8px; margin: 15px auto; max-width: 500px; text-align: left; }
    .rank-box h3 { margin-top: 0; color: #333; text-align: center; border-bottom: 2px solid #008ccb; padding-bottom: 5px; }
    .rank-list { list-style: none; padding: 0; margin: 0; }
    .rank-list li { font-size: 15px; font-weight: bold; padding: 8px 0; border-bottom: 1px dashed #ccc; font-family: monospace; }
    .my-score-highlight { font-size: 32px; font-weight: bold; color: #dc3545; margin: 10px 0; }
    .result-details { font-size: 16px; margin-bottom: 20px; line-height: 1.6; }
  </style>
</head>
<body>

<div class="container">
  <div id="start-screen" class="screen active">
    <h1>難読さかな編漢字クイズ</h1>
    <label for="age-select">あなたの 年齢 / 学年 を教えてね：</label>
    <select id="age-select" onchange="updateStartRanking()">
      <option value="初級(3択)">幼児～小学校低学年 (3択)</option>
      <option value="中級(4択)" selected>小学校高学年～中学生 (4択)</option>
      <option value="上級(5択)">高校生～大人 (5択・激難)</option>
    </select>
    
    <button class="btn" onclick="startQuiz()">クイズを始める</button>

    <div class="rank-box">
      <h3 id="start-rank-title">【中級(4択)の現在のトップ3】</h3>
      <ul id="start-ranking-list" class="rank-list">
        <li>読み込み中...</li>
      </ul>
    </div>
  </div>

  <div id="quiz-screen" class="screen">
    <div id="question-progress" style="font-size: 14px; color: #666;"></div>
    <div class="image-container" id="fish-image-area">🔍 お魚漢字の正体は何かな？</div>
    <div class="kanji" id="kanji-display"></div>
    <div id="choices-container"></div>
    <div id="result-message" style="font-size: 20px; font-weight: bold; margin: 15px 0; min-height: 30px;"></div>
    <button id="btn-next" class="btn btn-next" style="display: none;" onclick="nextQuestion()">次の問題へ</button>
  </div>

  <div id="result-screen" class="screen">
    <h1>=== 最終結果 ===</h1>
    <div id="total-score-display" class="my-score-highlight">0 点</div>
    <div id="result-details-display" class="result-details"></div>
    
    <div id="register-area">
      <label for="player-name">ランキングに名前を登録:</label>
      <input type="text" id="player-name" value="プレイヤー1" maxlength="15"><br>
      <button class="btn" onclick="registerRanking()">登録してランキングを見る</button>
    </div>
  </div>

  <div id="ranking-screen" class="screen">
    <h1 id="ranking-title">🏆 ランキング Top 5 🏆</h1>
    <div id="my-rank-display" style="font-size: 22px; font-weight: bold; color: #0056b3; margin-bottom: 15px;"></div>
    
    <div class="rank-box">
      <ul id="global-ranking-list" class="rank-list">
        <li>読み込み中...</li>
      </ul>
    </div>
    
    <button class="btn" style="background-color: #6c757d;" onclick="showStartScreen()">タイトルへ戻る</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
  import { getDatabase, ref, push, set, onValue, query, orderByChild } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

  // ⚠️【最重要】ここをご自身のFirebaseプロジェクトの設定に書き換えてください
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "fish-quiz-ranking.firebaseapp.com",
    databaseURL: "https://fish-quiz-ranking-default-rtdb.firebaseio.com",
    projectId: "fish-quiz-ranking",
    storageBucket: "fish-quiz-ranking.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  // Firebase初期化
  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  // --- Pythonコードから移植した魚漢字データ ---
  const kanjiEasy = {
    "魚": "さかな", "鮎": "あゆ", "鰯": "いわし", "鰻": "うなぎ", "海老": "えび",
    "鮭": "さけ", "鯖": "さば", "鯛": "たい", "鯨": "くじら", "蛸": "たこ",
    "鯉": "こい", "鮫": "さめ", "鮪": "まぐろ", "鰹": "かつお", "鱈": "たら",
    "鱒": "ます", "鰈": "かれい", "鮃": "ひらめ", "蟹": "かに", "貝": "かい"
  };

  const kanjiNormal = {
    "鯵": "あじ", "鰺": "あじ", "鮑": "あわび", "鰒": "ふぐ", "魷": "いか",
    "鯔": "ぼら", "鯆": "いるか", "鮇": "いわな", "鱓": "うつぼ", "鱏": "えい",
    "鮖": "かじか", "魛": "たちうお", "鰊": "にしん", "鯏": "あさり", "鰡": "ぼら",
    "鯑": "かずのこ", "鮟鱇": "あんこう", "鰍": "どじょう", "鰌": "どじょう", "鰔": "さより",
    "魴": "ほうぼう", "鮗": "このしろ", "鯊": "はぜ", "鯳": "すけとうだら", "鱚": "きす"
  };

  const kanjiHard = {
    "魭": "あおうみがめ", "鯘": "あざれ", "鮩": "あみ", 
    "鯇": "あめのうお", "鰀": "あめのうお", "鮟": "あん", 
    "鮧": "えそ", "鰂": "いか", "鰞": "いか", "鮻": "いさぎ", 
    "": "いさざ", "鱊": "いさだ", "鰵": "いしもち", "鰝": "いせえび", 
    "魚鬼": "いとう", "鰮": "いわし", "鰛": "いわし", "鷠": "ぎょ", 
    "鰾": "うきぶくろ", "鱥": "うぐい", "魿": "うろこ", 
    "鱁": "うるか", "鱗": "うろこ", "鱝": "えい", "鰩": "とびうお", 
    "鱛": "えそ", "鮆": "えつ", "鱴": "えつ", 
    "魮": "えつ", "鰕": "えび", "鰓": "えら", 
    "魞": "えり", "鰲": "おおがめ", "鮱": "ぼら", "鰧": "おこぜ", 
    "魯": "おろか", "鱠": "なます", "鱪": "しいら", "": "かます",
    "鱫": "えそ", "鱦": "かたくちいわし", "鯺": "ふぐ", "鱵": "さより",
    "鱨": "ぎぎ", "鮄": "ほうぼう", "鯓": "うろこ"
  };

  // 内部変数
  let modeType = "中級(4択)";
  let choiceCount = 4;
  let currentDict = kanjiNormal;
  let questions = [];
  let currentIndex = 0;
  let correctCount = 0;
  let startTime = 0;
  let totalTime = 0;
  let totalScore = 0;
  let currentRankingData = []; // 現在のモードのリアルタイムランキング保持用

  // 画面切り替え
  function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
  }

  window.showStartScreen = function() {
    showScreen('start-screen');
    updateStartRanking();
  }

  // スタート画面のトップ3リアルタイム表示
  window.updateStartRanking = function() {
    const select = document.getElementById('age-select');
    modeType = select.value;
    document.getElementById('start-rank-title').innerText = `【${modeType}の現在のトップ3】`;
    
    const startListContainer = document.getElementById('start-ranking-list');
    startListContainer.innerHTML = "<li>読み込み中...</li>";

    const scoresRef = ref(database, 'scores/' + modeType);
    onValue(scoresRef, (snapshot) => {
      const data = snapshot.val();
      const records = [];
      for (let id in data) { records.push(data[id]); }
      
      // Python版同様：スコア降順、同点ならタイム昇順
      records.sort((a, b) => (b.score - a.score) || (a.time - b.time));
      currentRankingData = records; // 保持しておく

      let html = "";
      records.slice(0, 3).forEach((r, i) => {
        html += `<li>${i+1}位: ${escapeHTML(r.name)} (${r.score.toLocaleString()}点 / ${r.correct}問 / ${r.time.toFixed(1)}秒)</li>`;
      });
      startListContainer.innerHTML = html || "<li>まだ記録がありません</li>";
    }, { onlyOnce: true });
  }

  // クイズ開始
  window.startQuiz = function() {
    const select = document.getElementById('age-select');
    modeType = select.value;
    
    if (modeType === "初級(3択)") {
      choiceCount = 3;
      currentDict = kanjiEasy;
    } else if (modeType === "中級(4択)") {
      choiceCount = 4;
      currentDict = kanjiNormal;
    } else {
      choiceCount = 5;
      currentDict = kanjiHard;
    }

    // 問題の抽選 (5問)
    const keys = Object.keys(currentDict).filter(k => k !== "");
    const shuffledKeys = keys.sort(() => 0.5 - Math.random());
    const selectedKeys = shuffledKeys.slice(0, Math.min(5, shuffledKeys.length));
    
    questions = selectedKeys.map(k => ({ kanji: k, yomi: currentDict[k] }));
    
    currentIndex = 0;
    correctCount = 0;
    startTime = Date.now();

    showScreen('quiz-screen');
    showQuestion();
  }

  function showQuestion() {
    const q = questions[currentIndex];
    document.getElementById('question-progress').innerText = `[${modeType}] 第 ${currentIndex + 1} 問 / 全 5 問`;
    document.getElementById('kanji-display').innerText = q.kanji;
    document.getElementById('result-message').innerText = "";
    document.getElementById('btn-next').style.display = "none";

    // 画像の処理 (Pythonの images/ファイル名.png 構造に準拠)
    const imgArea = document.getElementById('fish-image-area');
    const img = new Image();
    img.src = `images/${q.kanji}.png`;
    img.onload = function() {
      imgArea.innerHTML = `<img src="images/${q.kanji}.png" alt="${q.kanji}">`;
    };
    img.onerror = function() {
      imgArea.innerText = "🔍 お魚漢字の正体は何かな？";
    };

    // 選択肢の生成
    const allYomi = Array.from(new Set(Object.values(currentDict)));
    const filteredYomi = allYomi.filter(y => y !== q.yomi);
    
    // バックアッププール処理
    let wrongChoicesPool = [...filteredYomi];
    const backupPool = ["まぐろ", "さけ", "さば", "いわし", "たい", "たこ", "いか"];
    if (wrongChoicesPool.length < (choiceCount - 1)) {
      backupPool.forEach(b => {
        if (b !== q.yomi && !wrongChoicesPool.includes(b)) wrongChoicesPool.push(b);
      });
    }

    // 誤選択肢をシャッフルして必要数抽出
    wrongChoicesPool.sort(() => 0.5 - Math.random());
    const choices = [q.yomi, ...wrongChoicesPool.slice(0, choiceCount - 1)];
    choices.sort(() => 0.5 - Math.random()); // 最終シャッフル

    const choicesContainer = document.getElementById('choices-container');
    choicesContainer.innerHTML = "";
    
    choices.forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.innerText = choice;
      btn.onclick = () => checkAnswer(choice, btn);
      choicesContainer.appendChild(btn);
    });
  }

  function checkAnswer(chosen, clickedBtn) {
    // すでに回答済みの場合は処理しない
    if (document.getElementById('btn-next').style.display === "block") return;

    const q = questions[currentIndex];
    const msg = document.getElementById('result-message');

    if (chosen === q.yomi) {
      msg.innerText = "⭕ 正解！";
      msg.style.color = "green";
      correctCount++;
    } else {
      msg.innerText = `❌ 不正解… 正しくは「${q.yomi}」`;
      msg.style.color = "red";
    }

    // 選択肢ボタンをすべて無効化
    document.querySelectorAll('#choices-container .btn').forEach(b => b.disabled = true);
    
    // 次へボタン表示
    const nextBtn = document.getElementById('btn-next');
    nextBtn.style.display = "block";
    nextBtn.focus();
  }

  window.nextQuestion = function() {
    currentIndex++;
    if (currentIndex >= questions.length) {
      calculateFinalScore();
    } else {
      showQuestion();
    }
  }

  // スコア計算ロジック (Python版の計算式を完全再現)
  function calculateFinalScore() {
    totalTime = (Date.now() - startTime) / 1000;
    
    const multiplier = choiceCount * 60;
    const baseScore = correctCount * multiplier;
    
    if (correctCount > 0) {
      const timeBonus = Math.max(0, Math.floor((50 - totalTime) * 10));
      totalScore = baseScore + timeBonus;
    } else {
      totalScore = 0;
    }

    document.getElementById('total-score-display').innerText = `${totalScore.toLocaleString()} 点`;
    document.getElementById('result-details-display').innerHTML = `
      モード: ${modeType}<br>
      正解数: ${correctCount} 問 / 5 問<br>
      クリア時間: ${totalTime.toFixed(1)} 秒
    `;

    document.getElementById('register-area').style.display = "block";
    showScreen('result-screen');
  }

  // オンラインランキングに登録・表示
  window.registerRanking = function() {
    const nameInput = document.getElementById('player-name');
    let name = nameInput.value.trim();
    if (!name) {
      alert("名前を入力してください。");
      return;
    }
    name = name.replace(/,/g, ""); // カンマ除去安全対策

    const scoresRef = ref(database, 'scores/' + modeType);
    const newRecordRef = push(scoresRef);

    // Firebaseへ保存するオブジェクト
    const newRecord = {
      name: name,
      score: totalScore,
      correct: correctCount,
      time: totalTime,
      timestamp: Date.now()
    };

    set(newRecordRef, newRecord).then(() => {
      document.getElementById('register-area').style.display = "none";
      showGlobalRanking(newRecord);
    }).catch((error) => {
      console.error("Firebase保存エラー:", error);
      alert("ランキングの登録に失敗しました。");
    });
  }

  function showGlobalRanking(myRecord) {
    document.getElementById('ranking-title').innerText = `🏆 ランキング Top 5 🏆\n(${modeType})`;
    showScreen('ranking-screen');

    const scoresRef = ref(database, 'scores/' + modeType);
    onValue(scoresRef, (snapshot) => {
      const data = snapshot.val();
      const records = [];
      for (let id in data) { records.push(data[id]); }
      
      // ソート
      records.sort((a, b) => (b.score - a.score) || (a.time - b.time));

      // 自分の順位を見つける
      let myRank = 0;
      for (let i = 0; i < records.length; i++) {
        if (records[i].name === myRecord.name && records[i].score === myRecord.score && records[i].time === myRecord.time) {
          myRank = i + 1;
          break;
        }
      }
      document.getElementById('my-rank-display').innerText = `あなたの順位：第 ${myRank} 位！`;

      // Top 5 のHTML書き出し
      const globalListContainer = document.getElementById('global-ranking-list');
      let html = "";
      
      records.slice(0, 5).forEach((r, i) => {
        let rankText = `第${i+1}位`;
        if (i === 0) rankText = "🥇1位";
        else if (i === 1) rankText = "🥈2位";
        else if (i === 2) rankText = "🥉3位";
        
        // パディングのシミュレーション
        const paddedRank = rankText.padEnd(4, ' ');
        const paddedName = r.name.substring(0, 10).padEnd(10, ' ');
        const paddedScore = r.score.toLocaleString().padStart(6, ' ');
        const paddedTime = r.time.toFixed(1).padStart(4, ' ');

        html += `<li>${paddedRank} : ${escapeHTML(paddedName)} [ ${paddedScore}点 | ${r.correct}問 | ${paddedTime}秒 ]</li>`;
      });

      globalListContainer.innerHTML = html || "<li>データがありません</li>";
    }, { onlyOnce: true });
  }

  // XSS対策
  function escapeHTML(str) {
    return str.replace(/[&<>'"]/g, 
      tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
    );
  }

  // ページ初期化時にスタート画面のトップ3を出す
  window.onload = function() {
    updateStartRanking();
  };
</script>
</body>
</html>
