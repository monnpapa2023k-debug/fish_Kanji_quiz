<!DOCTYPE html>
<html lang="ja">
<head>

    <meta charset="UTF-8">
    <title>魚漢字クイズ（Web版）</title>
    <link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1">

</head>
<body>

    <div id="app">
        <!-- スタート画面 -->
        <div id="start-screen" class="screen">
            <h1>難読さかな漢字クイズ</h1>

            <label>難易度を選んでね：</label>
            <select id="difficulty">
                <option value="easy">初級（3択）</option>
                <option value="normal">中級（4択）</option>
                <option value="hard">上級（5択）</option>
            </select>

            <button id="start-btn">クイズを始める</button>

            <div id="ranking-preview"></div>
        </div>

        <!-- クイズ画面 -->
        <div id="quiz-screen" class="screen hidden">
            <h2 id="progress"></h2>
            <div id="kanji-image"></div>
            <h1 id="question"></h1>
            <div id="choices"></div>
            <p id="result"></p>
            <button id="next-btn" class="hidden">次の問題へ</button>
        </div>

        <!-- 結果画面 -->
        <div id="result-screen" class="screen hidden">
            <h1>結果発表！</h1>
            <h2 id="final-score"></h2>
            <p id="final-detail"></p>

            <label>名前を入力してランキング登録：</label>
            <input id="player-name" type="text" value="プレイヤー1">

            <button id="save-btn">ランキングに登録</button>
        </div>

        <!-- ランキング画面 -->
        <div id="ranking-screen" class="screen hidden">
            <h1 id="rank-title"></h1>
            <div id="ranking-list"></div>
            <button id="back-btn">タイトルへ戻る</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
