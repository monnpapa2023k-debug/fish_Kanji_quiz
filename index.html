<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>進化した！難読さかな漢字クイズ</title>
  <style>
    /* 全体のリセットと海背景のベースグラデーション */
    body {
      font-family: 'MS Gothic', 'Yu Gothic', Arial, sans-serif;
      background: linear-gradient(to bottom, #1e528e 0%, #2672b1 50%, #50a7d7 100%);
      color: #333;
      text-align: center;
      padding: 20px;
      margin: 0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* 魚のアニメーションを描画するキャンバス */
    #aquarium-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1; /* 背景として一番後ろに配置 */
      pointer-events: none; /* クイズのボタン操作を邪魔しないようにする */
    }

    /* クイズ画面を囲む白いボックス（後ろが透けて綺麗に見えるように半透明化） */
    .container {
      max-width: 650px;
      margin: 40px auto;
      background: rgba(255, 255, 255, 0.92); /* 少し透明な白 */
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      position: relative;
      z-index: 2; /* アニメーションの手前に表示 */
      backdrop-filter: blur(4px); /* 背景をほんのりぼかすおしゃれエフェクト */
    }

    h1 { color: #0056b3; font-size: 28px; font-weight: bold; margin-bottom: 25px; }
    label { font-size: 18px; font-weight: bold; display: block; margin-bottom: 10px; color: #444; }
    
    select {
      font-size: 18px;
      padding: 10px;
      width: 90%;
      max-width: 500px;
      margin-bottom: 20px;
      border-radius: 6px;
      border: 2px solid #008ccb;
      background-color: white;
    }

    .kanji { font-size: 76px; font-weight: bold; margin: 15px 0; color: #111; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
    
    .image-container {
      font-size: 14px;
      font-style: italic;
      color: gray;
      margin: 10px 0;
      min-height: 20px;
    }
    .image-container img {
      max-width: 200px;
      max-height: 150px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 500px;
      margin: 12px auto;
      padding: 14px;
      font-size: 18px;
      font-weight: bold;
      background-color: #008ccb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: all 0.2s;
    }
    .btn:hover { background-color: #006699; transform: translateY(-1px); }
    .btn:active { transform: translateY(1px); }
    
    .btn-next { background-color: #28a745; }
    .btn-next:hover { background-color: #218838; }
    
    input[type="text"] {
      width: 80%;
      max-width: 300px;
      padding: 12px;
      font-size: 18px;
      text-align: center;
      margin-bottom: 15px;
      border: 2px solid #008ccb;
      border-radius: 6px;
    }

    .screen { display: none; }
    .active { display: block; }
    
    .rank-box { background: rgba(240, 248, 255, 0.6); padding: 15px; border-radius: 8px; margin: 15px auto; max-width: 500px; text-align: left; border: 1px solid #b0d4de; }
    .rank-box h3 { margin-top: 0; color: #0044aa; text-align: center; border-bottom: 2px solid #008ccb; padding-bottom: 5px; }
    .rank-list { list-style: none; padding: 0; margin: 0; }
    .rank-list li { font-size: 15px; font-weight: bold; padding: 8px 0; border-bottom: 1px dashed #ccc; font-family: monospace; color: #222; }
    .my-score-highlight { font-size: 36px; font-weight: bold; color: #dc3545; margin: 10px 0; }
    .result-details { font-size: 17px; margin-bottom: 20px; line-height: 1.6; font-weight: bold; color: #444; }
  </style>
</head>
<body>

  <canvas id="aquarium-canvas"></canvas>

  <div class="container">
    <div id="start-screen" class="screen active">
      <h1>🐟 難読さかな編漢字クイズ 🐟</h1>
      <label for="age-select">あなたの 年齢 / 学年 を教えてね：</label>
      <select id="age-select">
        <option value="初級(3択)">幼児～小学校低学年 (3択)</option>
        <option value="中級(4択)" selected>小学校高学年～中学生 (4択)</option>
        <option value="上級(5択)">高校生～大人 (5択・激難)</option>
      </select>
      
      <button class="btn" id="start-btn">クイズを始める</button>

      <div class="rank-box">
        <h3 id="start-rank-title">【中級(4択)の現在のトップ3】</h3>
        <ul id="start-ranking-list" class="rank-list">
          <li>読み込み中...</li>
        </ul>
      </div>
    </div>

    <div id="quiz-screen" class="screen">
      <div id="question-progress" style="font-size: 15px; font-weight: bold; color: #555;"></div>
      <div class="image-container" id="fish-image-area">🔍 お魚漢字の正体は何かな？</div>
      <div class="kanji" id="kanji-display"></div>
      <div id="choices-container"></div>
      <div id="result-message" style="font-size: 22px; font-weight: bold; margin: 15px 0; min-height: 32px;"></div>
      <button id="btn-next" class="btn btn-next" style="display: none;">次の問題へ</button>
    </div>

    <div id="result-screen" class="screen">
      <h1>=== 最終結果 ===</h1>
      <div id="total-score-display" class="my-score-highlight">0 点</div>
      <div id="result-details-display" class="result-details"></div>
      
      <div id="register-area">
        <label for="player-name">ランキングに名前を登録:</label>
        <input type="text" id="player-name" value="プレイヤー1" maxlength="15"><br>
        <button class="btn" id="register-btn">登録してランキングを見る</button>
      </div>
    </div>

    <div id="ranking-screen" class="screen">
      <h1 id="ranking-title">🏆 ランキング Top 5 🏆</h1>
      <div id="my-rank-display" style="font-size: 22px; font-weight: bold; color: #0056b3; margin-bottom: 15px;"></div>
      
      <div class="rank-box">
        <ul id="global-ranking-list" class="rank-list">
          <li>読み込み中...</li>
        </ul>
      </div>
      
      <button class="btn" style="background-color: #dc3545; margin-bottom: 15px;" id="delete-rank-btn">❌ このモードのランキングをすべて消す</button>
      <button class="btn" style="background-color: #6c757d;" id="back-title-btn">タイトルへ戻る</button>
    </div>
  </div>

  <script type="module" src="script.js"></script>

  <script>
    const canvas = document.getElementById('aquarium-canvas');
    const ctx = canvas.getContext('2d');

    // 画面サイズぴったりにキャンバスを合わせる
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // 泳ぐ魚のクラス
    class SwimmingFish {
      constructor() {
        this.reset();
        // 最初は画面のあちこちに散らばらせる
        this.x = Math.random() * canvas.width;
      }

      reset() {
        this.size = Math.random() * 20 + 15; // 魚の大きさ (15〜35px)
        this.speed = Math.random() * 1.2 + 0.5; // 動くスピード
        this.direction = Math.random() > 0.3 ? 1 : -1; // 1:右へ進む, -1:左へ進む (右向き多め)
        
        // 画面の端から出現させる
        if (this.direction === 1) {
          this.x = -this.size * 2;
        } else {
          this.x = canvas.width + this.size * 2;
        }
        
        this.y = Math.random() * (canvas.height * 0.8) + (canvas.height * 0.1); // 上下10%を避けた位置
        this.color = `hsla(${Math.random() * 40 + 190}, 85%, 65%, 0.35)`; // 透き通った青〜水色のランダム
        this.waveSpeed = Math.random() * 0.05 + 0.02; // 尾びれを振る・上下に揺れる細かさ
        this.waveCount = Math.random() * 100;
      }

      update() {
        this.x += this.speed * this.direction;
        this.waveCount += this.waveSpeed;
        
        // ほんの少し上下にゆらゆらさせる
        this.y += Math.sin(this.waveCount) * 0.3;

        // 画面外に出たらリセットして再登場
        if (this.direction === 1 && this.x > canvas.width + this.size * 2) {
          this.reset();
        } else if (this.direction === -1 && this.x < -this.size * 2) {
          this.reset();
        }
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // 左に進むときは左右反転する
        if (this.direction === -1) {
          ctx.scale(-1, 1);
        }

        ctx.fillStyle = this.color;
        ctx.beginPath();

        // 🐟 シンプルでかわいいお魚の形を描画
        // 体
        ctx.moveTo(-this.size, 0);
        ctx.quadraticCurveTo(-this.size * 0.3, -this.size * 0.5, this.size * 0.5, 0);
        ctx.quadraticCurveTo(-this.size * 0.3, this.size * 0.5, -this.size, 0);
        
        // 尾びれ（アニメーションに合わせて少しゆらゆら動く）
        const tailWag = Math.sin(this.waveCount) * (this.size * 0.15);
        ctx.moveTo(-this.size, 0);
        ctx.lineTo(-this.size * 1.3, -this.size * 0.4 + tailWag);
        ctx.lineTo(-this.size * 1.1, 0);
        ctx.lineTo(-this.size * 1.3, this.size * 0.4 + tailWag);
        
        ctx.closePath();
        ctx.fill();
        
        // ぷくぷく目玉
        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.beginPath();
        ctx.arc(this.size * 0.2, -this.size * 0.1, this.size * 0.08, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    // 泡（あぶく）のクラス
    class Bubble {
      constructor() {
        this.reset();
        this.y = Math.random() * canvas.height; // 最初は画面のあちこちから
      }

      reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + 20;
        this.radius = Math.random() * 4 + 1; // 1px〜5pxの小さな泡
        this.speed = Math.random() * 1.0 + 0.4; // 上昇スピード
        this.opacity = Math.random() * 0.3 + 0.1; // 透明度
        this.wobbleSpeed = Math.random() * 0.02 + 0.01;
        this.wobbleCount = Math.random() * 100;
      }

      update() {
        this.y -= this.speed;
        this.wobbleCount += this.wobbleSpeed;
        this.x += Math.sin(this.wobbleCount) * 0.2; // 横にゆらゆら上昇

        if (this.y < -20) {
          this.reset();
        }
      }

      draw() {
        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // 魚と泡をたくさん作成する（魚20匹、泡40個）
    const fishes = Array.from({ length: 20 }, () => new SwimmingFish());
    const bubbles = Array.from({ length: 40 }, () => new Bubble());

    // アニメーションのループ処理
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 泡を動かして描画
      bubbles.forEach(b => {
        b.update();
        b.draw();
      });

      // 魚を動かして描画
      fishes.forEach(f => {
        f.update();
        f.draw();
      });

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
