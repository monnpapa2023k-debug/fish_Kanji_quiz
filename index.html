<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>さかな漢字クイズ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
    <h1>さかな漢字クイズ</h1>

    <div id="start-screen">
        <select id="mode-select">
            <option value="easy">初級（3択）</option>
            <option value="normal">中級（4択）</option>
            <option value="hard">上級（5択）</option>
        </select>
        <button id="start-btn">スタート</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="question"></div>
        <img id="fish-image" src="">
        <div id="choices"></div>
        <div id="result"></div>
        <button id="next-btn" class="hidden">次へ</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
